# ───────────────────────────────────────────────
#  MulJuseyo 設定ファイル
# ───────────────────────────────────────────────

# enabled: サーバー全体で水分補給リマインドを有効にするかどうか。
#          この値を編集して /muljuseyo reload すると反映されます。
#          （各プレイヤーの通知 ON/OFF は /muljuseyo on | off で個別に切り替えます）
enabled: true

# interval-minutes: 何分ごとに「水を飲んでください」と通知するか（最小 1・最大 1440）。
#                   既定は 60 分（1 時間に 1 度）。
interval-minutes: 60

# remind-on-join: ログイン直後にも一度通知するか。false ならログインから interval-minutes 後が初回。
remind-on-join: false

# notify-sound: 通知時にベル音を鳴らすかどうか。
notify-sound: true

# message: 通知に表示するメッセージ本文。
message: "水を飲んでください！"
