name: MulJuseyo
version: 1.0.0
main: io.github.astail.muljuseyo.MulJuseyoPlugin
description: "1 時間に 1 度「水を飲んでください」と本人へ通知するプラグインです。"
api-version: '26.1.2'
author: astail

commands:
  muljuseyo:
    description: "水分補給リマインドの確認・設定を行います。"
    usage: "/muljuseyo <status|drink|on|off|reload>"
    aliases: [mj, water]
    permission: muljuseyo.use
    permission-message: "§cこのコマンドを実行する権限がありません。"

permissions:
  muljuseyo.notify:
    description: "水分補給リマインドを受け取れるかどうか（受信可否）。通知を ON にしていても、これが無いと届きません。"
    default: true
  muljuseyo.use:
    description: "/muljuseyo の自分向け操作（status / drink / on / off）を許可します。"
    default: true
  muljuseyo.manage:
    description: "/muljuseyo reload など、サーバー全体に影響する操作を許可します。"
    default: op
